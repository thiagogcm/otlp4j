name: build

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # `verify` runs the full test suite (unit + integration + property), the JaCoCo
      # report/aggregate, and the javadoc doclint pass.
      - name: Build and verify
        run: ./mvnw -B verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate
          path: otlp4j-coverage/target/site/jacoco-aggregate
          if-no-files-found: warn
